name: Release MoyuShuang

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 第一部分：并发编译
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUT_NAME="MoyuShuang-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -trimpath -ldflags="-s -w" -o "$OUT_NAME" main.go
          
      # 暂存编译好的文件，不在这里发布
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: MoyuShuang-*

  # 第二部分：统一发布（只运行一次）
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-binaries
          pattern: binaries-*
          merge-multiple: true

      - name: Display files
        run: ls -R ./all-binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all-binaries/moyu-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
