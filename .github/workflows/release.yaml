name: Release MoyuShuang

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest  # 统一使用 Linux 进行交叉编译是高效的，但需要注意缓存
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          # 关键点：如果一定要用缓存，必须针对每个平台区分 key
          cache-dependency-path: go.sum

      - name: Build Binary
        shell: bash  # 强制使用 bash 确保逻辑一致
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          # 定义输出文件名
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          
          OUT_NAME="moyu-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          
          echo "Building $OUT_NAME..."
          go build -trimpath -ldflags="-s -w" -o "$OUT_NAME" main.go

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: moyu-${{ matrix.goos }}-${{ matrix.goarch }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
