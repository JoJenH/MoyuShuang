name: Release MoyuShuang

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 第一阶段：并行交叉编译所有平台的二进制文件
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # 如果之前有 tar 报错，建议先关闭缓存

      - name: Build
        shell: bash
        env:
          # 🚨 关键：显式设置这些变量，Go 编译器才会执行交叉编译
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 
        run: |
          BINARY_NAME="MoyuShuang-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="$BINARY_NAME.exe"
          fi
          
          echo "正在为 $GOOS/$GOARCH 编译..."
          # -trimpath 隐藏路径信息，-s -w 压缩体积并移除调试符号
          go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME" main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: MoyuShuang-*

  # 第二阶段：汇总所有文件并统一发布（避免 API 冲突）
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: binaries-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          body: |
            ## 🥢 MoyuShuang 指标增强包
            本版本显著提升了系统的平均爽度。
            - 🌶️ 优化了红油配比算法
            - 🥢 增强了切片数据流的稳定性
          token: ${{ secrets.GITHUB_TOKEN }}
